<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YugSetu - Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anek+Devanagari:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./home/styles.css">
</head>
<body>
  <div class="logo">
    <img src="./home/tc logo.jpeg" alt="Logo">
  </div>
  <div class="countdown-container">
    <div class="coming-soon">COMING SOON</div>
  </div>
  <div class="countdown">
    <span class="countdown-number" id="days">00</span>
    <span class="countdown-separator">:</span>
    <span class="countdown-number" id="hours">00</span>
    <span class="countdown-separator">:</span>
    <span class="countdown-number" id="minutes">00</span>
    <span class="countdown-separator">:</span>
    <span class="countdown-number" id="seconds">00</span>
  </div>
  <div class="countdown-text">
    <span class="countdown-text1">  Days   </span>
    <span class="countdown-text1">  Hours  </span>
    <span class="countdown-text1">  Minutes  </span>
    <span class="countdown-text1">  Seconds  </span>
  </div>

  <script src="./home/script.js"></script>
</body>
</html>
