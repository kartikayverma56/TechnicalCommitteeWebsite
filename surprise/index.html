<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Induction Program - Technical Committee</title>
    <link rel="stylesheet" href="./styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    
</head>
<body>

    <!-- Logo (Before and After Clicking the Button) -->
    <img src="./images/tc_logo.png" alt="Committee Logo" class="logo">

    <!-- Instagram Icon -->
    <a href="https://www.instagram.com/techvibesbit/" target="_blank">
        <img src="./images/ig_logo.png" alt="Instagram" class="social-icon instagram-icon">
    </a>

    <!-- Chatbot Icon (Space reserved at the bottom-right corner) -->
    <a href="https://forms.gle/hqagsnMHw2UUTyQ27" target="_blank">
        <img src="./images/cb.jpg" alt="Chatbot" class="social-icon chatbot-icon">
    </a>

    <div id="heading">
    <h1>
        SOMETHING IS COOKING!!<br>
        <span>Click Down Here!!</span>
    </h1>
    </div>

    <!-- Circular Button with Image -->
    <div id="circular-button" onclick="">
        <img src="./images/button.png" alt="Button Image" id="button-image">
        <div class="ring"></div>
    </div>

    <!-- Content After Button Click -->
    <div id="content">
        <div class="text-content">
            <h1>Hello Freshers!</h1>
            <h3>🚀Seniors are calling you out!!<br>
                📅4th September, 4 PM<br>
                📍Seminar Hall<br>
            </h3>
            <p>A twist you didn’t see coming… mark the date</p>
        </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
